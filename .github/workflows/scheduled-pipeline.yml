name: Scheduled Daily Pipeline

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-daily-pipeline
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call production cron endpoint
        env:
          APP_CRON_URL: ${{ secrets.APP_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_CRON_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            -X POST "$APP_CRON_URL" \
            -H "Authorization: Bearer $CRON_SECRET"
