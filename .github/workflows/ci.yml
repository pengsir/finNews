name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create CI env file
        run: |
          cat <<'EOF' > .env.dev
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/fin_news"
          DIRECT_URL="postgresql://postgres:postgres@localhost:5432/fin_news"
          ADMIN_USERNAME="admin"
          ADMIN_PASSWORD="ci-admin-password"
          ADMIN_SESSION_SECRET="ci-admin-session-secret"
          CRON_SECRET="ci-cron-secret"
          RSS_ALLOW_INSECURE_TLS="false"
          EOF

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
