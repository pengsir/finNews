name: Pipeline Runner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Trigger source recorded in JobRun"
        required: false
        default: "ADMIN"

concurrency:
  group: pipeline-runner
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run scheduled pipeline gate
        if: github.event_name == 'schedule'
        run: npx tsx scripts/run-scheduled-pipeline.ts

      - name: Run manual pipeline
        if: github.event_name == 'workflow_dispatch'
        env:
          PIPELINE_TRIGGER_SOURCE: ${{ inputs.trigger_source }}
        run: npx tsx scripts/run-daily-pipeline.ts
